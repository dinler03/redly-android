name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build APK and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Build web + Capacitor sync
        run: npm run build

      - name: Grant gradlew executable permission
        run: chmod +x android/gradlew

      - name: Build Android debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK to match expected pattern
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             release/Redly_${{ steps.tag.outputs.tag }}.apk

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          version="${tag#v}"
          notes=$(awk -v v="$version" '
            $0 ~ "^## \\["v"\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$notes" ]; then
            notes="See [CHANGELOG.md](./CHANGELOG.md)."
          fi
          {
            echo "notes<<__EOF__"
            echo "$notes"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Redly ${{ steps.tag.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            release/Redly_${{ steps.tag.outputs.tag }}.apk
